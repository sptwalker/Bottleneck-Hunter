# BottleneckHunter 运维日志 — Grafana 反代片段
# 放进 bh.youdoogo.com 的 server{} 块（与现有 8089 反代同级）。nginx 在 /usr/local/nginx。
#
# 用法：把本文件 include 进站点 server{} 内，或直接把下面的 location 拷进去。
#   include /path/to/Bottleneck-Hunter/deploy/nginx-observability.conf;
#
# 说明：
# - Grafana 以子路径部署（compose 里已设 GF_SERVER_ROOT_URL + SERVE_FROM_SUB_PATH）。
# - Grafana 容器仅绑定 127.0.0.1:3000，不公网；只经这里的反代出去（有 Grafana 登录墙）。
# - Loki/Alloy 不反代、不暴露：Claude 查日志走 Grafana 数据源代理 API（同一 /grafana/ 下）。
# - live tail 走 WebSocket，需要 Upgrade/Connection 头。

location /grafana/ {
    # 注意：不要加结尾斜杠！Grafana 以子路径模式运行(serve_from_sub_path=true)，
    # 需要保留 /grafana/ 前缀转发给它；加了 "/" 会把前缀剥掉 → Grafana 404/跳转错乱。
    proxy_pass http://127.0.0.1:3000;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Grafana Live / Explore live tail 走 WebSocket
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    # 日志查询可能较久，放宽读超时
    proxy_read_timeout 300s;
    proxy_buffering off;
}
