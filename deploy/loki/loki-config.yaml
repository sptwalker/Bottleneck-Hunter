# Loki 单体(monolithic)配置 — 单机 filesystem 存储，低资源，14 天保留。
# 仅内网使用（无鉴权）；对外只暴露 Grafana。详见 docs/OBSERVABILITY.md。
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 336h          # 日志保留 14 天（超期由 compactor 清理）
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  max_query_series: 5000
  allow_structured_metadata: true
  volume_enabled: true

compactor:
  working_directory: /loki/compactor
  retention_enabled: true         # 开启按 retention_period 删除
  delete_request_store: filesystem
  compaction_interval: 10m

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

# 单机不需要 analytics 上报
analytics:
  reporting_enabled: false
