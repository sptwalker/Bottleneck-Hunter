services:
  bottleneck-hunter:
    build: .
    image: bottleneck-hunter:latest
    container_name: bottleneck-hunter
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8000}:8000"
    volumes:
      # SQLite 库 + 加密密钥 + JWT secret（丢失则已加密数据无法解密，务必持久化）
      - ./data:/app/data
      # 生成的 Markdown 报告
      - ./output:/app/output
      # 应用会写回 .env（保存 AI 配置），需可写挂载
      - ./.env:/app/.env
    environment:
      - TZ=Asia/Shanghai
    # 资源上限：LLM 失控扇出/内存尖峰只打死本容器，不拖垮宿主（nginx/其它容器）。
    # compose v2 单机部署用顶层 mem_limit/cpus（非 swarm 的 deploy.resources）。
    mem_limit: 3g
    cpus: 2.0
    # 容器 stdout 日志轮转，避免 /var/lib/docker 无界增长（Alloy 也从这里采集）。
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "http://127.0.0.1:8000/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

# 运维日志栈（Loki + Alloy + Grafana）为可选叠加，见 docker-compose.observability.yml：
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml up -d
# 拆分原因：Grafana 密码 fail-closed 校验不应连累核心 app 构建（compose 对整文件插值）。
