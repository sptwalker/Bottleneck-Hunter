<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 — BottleneckHunter</title>
  <link rel="stylesheet" href="/static/css/base/tokens.css">
  <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
      </svg>
      <h1>BottleneckHunter</h1>
      <p>AI 产业链瓶颈选股系统</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">登录</button>
      <button class="auth-tab" data-tab="register">注册</button>
    </div>

    <div id="auth-error" class="auth-error"></div>
    <div id="auth-success" class="auth-success"></div>

    <!-- 登录表单 -->
    <form id="form-login" class="auth-form active" autocomplete="on">
      <div class="auth-field">
        <label for="login-username">用户名</label>
        <input type="text" id="login-username" name="username" required autocomplete="username" placeholder="输入用户名">
      </div>
      <div class="auth-field">
        <label for="login-password">密码</label>
        <input type="password" id="login-password" name="password" required autocomplete="current-password" placeholder="输入密码">
      </div>
      <button type="submit" class="auth-btn" id="btn-login">登 录</button>
    </form>

    <!-- 注册表单 -->
    <form id="form-register" class="auth-form" autocomplete="on">
      <div class="auth-field">
        <label for="reg-username">用户名</label>
        <input type="text" id="reg-username" name="username" required autocomplete="username" placeholder="2-32位，支持字母数字下划线中文">
      </div>
      <div class="auth-field">
        <label for="reg-display-name">显示名称</label>
        <input type="text" id="reg-display-name" name="display_name" placeholder="可选，默认同用户名">
      </div>
      <div class="auth-field">
        <label for="reg-password">密码</label>
        <input type="password" id="reg-password" name="password" required autocomplete="new-password" placeholder="至少8位">
      </div>
      <div class="auth-field">
        <label for="reg-invite-code">邀请码</label>
        <input type="text" id="reg-invite-code" name="invite_code" placeholder="如有邀请码请填写">
        <div class="field-hint">开放注册期间无需邀请码</div>
      </div>
      <button type="submit" class="auth-btn" id="btn-register">注 册</button>
    </form>

    <div class="auth-footer">BottleneckHunter &copy; <script>document.currentScript.parentElement.appendChild(document.createTextNode(new Date().getFullYear()))</script></div>
  </div>
</div>
<script src="/static/js/auth.js"></script>
</body>
</html>
