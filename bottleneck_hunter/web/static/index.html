<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BottleneckHunter — AI 产业链瓶颈选股</title>
  <link rel="stylesheet" href="/static/css/style.css?v=2">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>

<header class="app-header">
  <div class="header-brand">
    <svg class="header-logo" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
    </svg>
    <span class="header-title">BottleneckHunter</span>
    <span class="header-subtitle">瓶颈猎手</span>
  </div>
  <nav class="header-nav">
    <button class="nav-btn active" data-view="screen">产业链分析</button>
    <button class="nav-btn" data-view="hot">热点扫描</button>
    <button class="nav-btn nav-btn-icon" id="btn-settings" title="API 设置">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </nav>
</header>

<main class="app-main">
  <aside id="panel" class="panel">
    <div class="panel-inner">
      <div class="panel-section">
        <h3 class="panel-heading">行业方向</h3>
        <div class="form-group">
          <label class="form-label">入口模式</label>
          <div class="radio-group">
            <label class="radio"><input type="radio" name="entry_mode" value="manual" checked><span>手动选择</span></label>
            <label class="radio"><input type="radio" name="entry_mode" value="hot"><span>从热点选择</span></label>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="sector-select">产业链方向</label>
          <select id="sector-select" class="form-select">
            <option value="GPU/AI算力" data-product="GPU">GPU / AI算力</option>
            <option value="人形机器人" data-product="人形机器人">人形机器人</option>
            <option value="商业航天" data-product="商业运载火箭">商业航天</option>
            <option value="新能源车" data-product="电动汽车">新能源车</option>
            <option value="custom">自定义输入...</option>
          </select>
        </div>
        <div class="form-group" id="custom-sector-group" style="display:none">
          <label class="form-label" for="custom-sector">产业名称</label>
          <input type="text" id="custom-sector" class="form-input" placeholder="例: 低空经济">
        </div>
        <div class="form-group">
          <label class="form-label" for="end-product">终端产品</label>
          <input type="text" id="end-product" class="form-input" value="GPU">
        </div>
      </div>

      <div class="panel-section">
        <h3 class="panel-heading">分析参数</h3>
        <div class="form-group">
          <label class="form-label">拆解深度</label>
          <div class="radio-group">
            <label class="radio"><input type="radio" name="max_depth" value="3"><span>3层</span></label>
            <label class="radio"><input type="radio" name="max_depth" value="4" checked><span>4层</span></label>
            <label class="radio"><input type="radio" name="max_depth" value="5"><span>5层</span></label>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group form-group--half">
            <label class="form-label" for="top-n">瓶颈 Top-N</label>
            <select id="top-n" class="form-select">
              <option value="3">3</option>
              <option value="5" selected>5</option>
              <option value="8">8</option>
              <option value="10">10</option>
            </select>
          </div>
          <div class="form-group form-group--half">
            <label class="form-label" for="language">输出语言</label>
            <select id="language" class="form-select">
              <option value="zh" selected>中文</option>
              <option value="en">English</option>
            </select>
          </div>
        </div>
      </div>

      <div class="panel-section">
        <h3 class="panel-heading">市场设置</h3>
        <div class="form-group">
          <label class="form-label">目标市场</label>
          <div class="radio-group">
            <label class="radio"><input type="radio" name="market" value="a_stock" checked><span>A 股</span></label>
            <label class="radio"><input type="radio" name="market" value="us_stock"><span>美股</span></label>
            <label class="radio"><input type="radio" name="market" value="all"><span>全部</span></label>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group form-group--half">
            <label class="form-label" for="max-cap">市值上限(亿)</label>
            <input type="number" id="max-cap" class="form-input" value="200">
          </div>
          <div class="form-group form-group--half">
            <label class="form-label" for="max-suppliers">供应商数</label>
            <input type="number" id="max-suppliers" class="form-input" value="20">
          </div>
        </div>
      </div>

      <div class="panel-section">
        <h3 class="panel-heading">LLM 配置</h3>
        <div class="form-row">
          <div class="form-group form-group--half">
            <label class="form-label" for="llm-provider">Provider</label>
            <select id="llm-provider" class="form-select">
              <option value="openai">OpenAI</option>
              <option value="anthropic">Anthropic</option>
              <option value="deepseek">DeepSeek</option>
              <option value="google">Google</option>
              <option value="qwen">Qwen</option>
              <option value="glm">GLM (智谱)</option>
              <option value="ollama">Ollama</option>
              <option value="openrouter">OpenRouter</option>
              <option value="siliconflow">SiliconFlow</option>
            </select>
          </div>
          <div class="form-group form-group--half">
            <label class="form-label" for="llm-model">Model</label>
            <input type="text" id="llm-model" class="form-input" value="gpt-5.5">
          </div>
        </div>
      </div>

      <div class="panel-section">
        <h3 class="panel-heading">交叉验证</h3>
        <div class="form-group">
          <label class="toggle">
            <input type="checkbox" id="cv-toggle">
            <span class="toggle-slider"></span>
            <span class="toggle-label">启用多模型验证</span>
          </label>
        </div>
        <div class="form-group" id="cv-models-group" style="display:none">
          <label class="form-label" for="cv-models">验证模型列表</label>
          <textarea id="cv-models" class="form-textarea" rows="2" placeholder="provider:model, 逗号分隔&#10;例: anthropic:claude-sonnet-4-6,deepseek:deepseek-v4-pro"></textarea>
        </div>
      </div>

      <div class="panel-actions">
        <button id="btn-start" class="btn btn-primary">开始分析</button>
      </div>
    </div>
  </aside>

  <section id="content" class="content">
    <!-- Welcome + History -->
    <div id="view-welcome" class="view active">
      <div class="welcome-hero">
        <div class="welcome-hero-icon">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
          </svg>
        </div>
        <div class="welcome-hero-text">
          <h2 class="welcome-hero-title">AI 产业链瓶颈选股系统</h2>
          <p class="welcome-hero-desc">从左侧面板选择行业方向开始新分析，或从下方历史记录中查看过往结果</p>
        </div>
      </div>

      <div class="welcome-divider"></div>

      <div class="history-section">
        <div class="history-header">
          <h3 class="history-title">历史分析记录</h3>
          <button class="btn btn-secondary btn-sm" id="btn-refresh-history">刷新</button>
        </div>
        <div id="history-list" class="history-list">
          <p class="loading-text">正在加载历史记录...</p>
        </div>
      </div>
    </div>

    <!-- Analysis running / results -->
    <div id="view-screen" class="view">
      <div id="pipeline" class="pipeline">
        <div class="pipeline-step" data-step="decompose"><span class="pipeline-dot"></span><span class="pipeline-label">拆解</span></div>
        <div class="pipeline-connector"></div>
        <div class="pipeline-step" data-step="bottleneck"><span class="pipeline-dot"></span><span class="pipeline-label">瓶颈</span></div>
        <div class="pipeline-connector"></div>
        <div class="pipeline-step" data-step="supplier_search"><span class="pipeline-dot"></span><span class="pipeline-label">检索</span></div>
        <div class="pipeline-connector"></div>
        <div class="pipeline-step" data-step="supplier_eval"><span class="pipeline-dot"></span><span class="pipeline-label">评估</span></div>
        <div class="pipeline-connector"></div>
        <div class="pipeline-step" data-step="cross_validate"><span class="pipeline-dot"></span><span class="pipeline-label">验证</span></div>
        <div class="pipeline-connector"></div>
        <div class="pipeline-step" data-step="save"><span class="pipeline-dot"></span><span class="pipeline-label">存储</span></div>
      </div>

      <div class="pipeline-status" id="pipeline-status"></div>

      <div class="dashboard-grid">
        <div class="dash-card dash-card--full" id="card-chain">
          <h3 class="dash-card-title">产业链图谱</h3>
          <div class="dash-card-body">
            <div id="chart-chain" class="chart-container chart-container--dag skeleton"></div>
          </div>
        </div>
        <div class="dash-card" id="card-bottleneck">
          <h3 class="dash-card-title">瓶颈排名</h3>
          <div class="dash-card-body">
            <div id="chart-bottleneck" class="chart-container skeleton"></div>
          </div>
        </div>
        <div class="dash-card" id="card-suppliers">
          <h3 class="dash-card-title">候选供应商</h3>
          <div class="dash-card-body">
            <div id="table-suppliers" class="table-container skeleton"></div>
          </div>
        </div>
        <div class="dash-card" id="card-validation">
          <h3 class="dash-card-title">交叉验证</h3>
          <div class="dash-card-body">
            <div id="table-validation" class="table-container skeleton"></div>
          </div>
        </div>
        <div class="dash-card dash-card--full" id="card-picks" style="display:none">
          <h3 class="dash-card-title">最终推荐</h3>
          <div class="dash-card-body" id="picks-body"></div>
        </div>
      </div>

      <div class="dashboard-actions" id="dashboard-actions" style="display:none">
        <button class="btn btn-secondary" id="btn-export">导出报告</button>
        <button class="btn btn-secondary" id="btn-rerun">重新分析</button>
      </div>
    </div>

    <!-- Hot sectors view -->
    <div id="view-hot" class="view">
      <div class="hot-header">
        <h2 class="hot-title">A 股热点板块扫描</h2>
        <button class="btn btn-secondary" id="btn-refresh-hot">刷新数据</button>
      </div>
      <div id="hot-table-wrap" class="skeleton" style="min-height:200px"></div>
      <div id="hot-emerging" style="margin-top:var(--sp-6)"></div>
    </div>
  </section>
</main>

<footer class="app-footer">
  <span>AI 生成内容，不构成投资建议。方法论：Serenity「三步法」— 产业链拆解 → 供应商检索 → 多模型交叉验证</span>
</footer>

<div id="settings-modal" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">LLM API 配置</h2>
      <button class="modal-close" id="btn-close-settings">&times;</button>
    </div>
    <div class="modal-body" id="settings-body">
      <p class="settings-hint">配置各 LLM Provider 的 API Key，保存后即时生效，无需重启。</p>
      <div id="provider-list"></div>
    </div>
    <div class="modal-footer">
      <span class="settings-status" id="settings-status"></span>
      <button class="btn btn-secondary" id="btn-cancel-settings">取消</button>
      <button class="btn btn-primary" id="btn-save-settings">保存</button>
    </div>
  </div>
</div>

<script type="module" src="/static/js/app.js?v=2"></script>
<script>
  window.addEventListener('error', e => {
    document.title = 'JS ERROR: ' + e.message;
    console.error('Global error:', e.message, e.filename, e.lineno);
  });
</script>
</body>
</html>
